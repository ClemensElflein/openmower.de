<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="gradCM4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#357ABD"/>
    </linearGradient>
    <linearGradient id="gradXCore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <linearGradient id="gradService" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F4F0"/>
    </linearGradient>
    <linearGradient id="gradHW" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    <linearGradient id="gradHWBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF2E9"/>
      <stop offset="100%" stop-color="#FDEBD0"/>
    </linearGradient>
    <linearGradient id="gradNTRIP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#7D3C98"/>
    </linearGradient>
    <linearGradient id="gradGamepad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#95A5A6"/>
      <stop offset="100%" stop-color="#7F8C8D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="680" rx="12" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#2C3E50">OpenMower V2 — System Architecture</text>

  <!-- ==================== CM4 TIER ==================== -->
  <rect x="60" y="55" width="700" height="105" rx="10" fill="url(#gradCM4)" filter="url(#shadow)"/>
  <text x="410" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Raspberry Pi Compute Module 4</text>

  <!-- ROS box -->
  <rect x="80" y="90" width="660" height="55" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="410" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">open_mower_ros  (ROS 2)</text>
  <text x="410" y="133" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">Navigation  ·  Path Planning  ·  Map Management  ·  RTK Corrections  ·  Web UI  ·  Home Assistant</text>

  <!-- NTRIP Caster (right of CM4, top half) -->
  <rect x="780" y="55" width="175" height="48" rx="8" fill="url(#gradNTRIP)" filter="url(#shadow)"/>
  <text x="867" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">NTRIP Caster</text>
  <text x="867" y="93" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">RTK Correction Stream</text>
  <!-- WiFi arrow: CM4 right edge ↔ NTRIP (dashed, bidirectional) -->
  <line x1="761" y1="79" x2="779" y2="79" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="780,79 773,76 773,82" fill="#9B59B6"/>
  <polygon points="760,79 767,76 767,82" fill="#9B59B6"/>
  <rect x="752" y="72" width="36" height="14" rx="7" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
  <text x="770" y="82" text-anchor="middle" font-size="8" font-weight="600" fill="#7F8C8D">WiFi</text>

  <!-- Gamepad (right of CM4, bottom half) -->
  <rect x="780" y="112" width="175" height="48" rx="8" fill="url(#gradGamepad)" filter="url(#shadow)"/>
  <text x="867" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Gamepad</text>
  <text x="867" y="150" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">User Input</text>
  <!-- USB arrow: Gamepad → CM4 -->
  <line x1="762" y1="136" x2="779" y2="136" stroke="#7F8C8D" stroke-width="1.5"/>
  <polygon points="760,136 767,133 767,139" fill="#7F8C8D"/>
  <rect x="752" y="129" width="36" height="14" rx="7" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
  <text x="770" y="139" text-anchor="middle" font-size="8" font-weight="600" fill="#7F8C8D">USB</text>

  <!-- Connection: CM4 <-> xCore -->
  <line x1="410" y1="160" x2="410" y2="195" stroke="#7F8C8D" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="410,195 405,185 415,185" fill="#7F8C8D"/>
  <polygon points="410,160 405,170 415,170" fill="#7F8C8D"/>
  <rect x="320" y="167" width="180" height="20" rx="10" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
  <text x="410" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#7F8C8D">Ethernet (xbot_framework)</text>

  <!-- ==================== xCORE TIER ==================== -->
  <rect x="60" y="200" width="700" height="250" rx="10" fill="url(#gradXCore)" filter="url(#shadow)"/>
  <text x="410" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">xCore Board  (STM32H723 Cortex-M7)</text>

  <!-- Firmware box -->
  <rect x="80" y="237" width="660" height="170" rx="8" fill="rgba(255,255,255,0.92)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <text x="410" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#27AE60">fw-openmower-v2  ·  ChibiOS RTOS</text>

  <!-- Service grid: 2 rows x 4 cols -->
  <!-- Row 1 -->
  <rect x="100" y="270" width="148" height="52" rx="5" fill="url(#gradService)" stroke="#27AE60" stroke-width="1.5"/>
  <text x="174" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">EmergencyService</text>
  <text x="174" y="306" text-anchor="middle" font-size="9" fill="#7F8C8D">Safety &amp; Timeouts</text>

  <rect x="260" y="270" width="148" height="52" rx="5" fill="url(#gradService)" stroke="#27AE60" stroke-width="1.5"/>
  <text x="334" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">DiffDriveService</text>
  <text x="334" y="306" text-anchor="middle" font-size="9" fill="#7F8C8D">L/R Wheel Motors</text>

  <rect x="420" y="270" width="148" height="52" rx="5" fill="url(#gradService)" stroke="#27AE60" stroke-width="1.5"/>
  <text x="494" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">MowerService</text>
  <text x="494" y="306" text-anchor="middle" font-size="9" fill="#7F8C8D">Blade Motor</text>

  <rect x="580" y="270" width="148" height="52" rx="5" fill="url(#gradService)" stroke="#27AE60" stroke-width="1.5"/>
  <text x="654" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">PowerService</text>
  <text x="654" y="306" text-anchor="middle" font-size="9" fill="#7F8C8D">Battery &amp; Charger</text>

  <!-- Row 2 -->
  <rect x="100" y="335" width="148" height="52" rx="5" fill="url(#gradService)" stroke="#27AE60" stroke-width="1.5"/>
  <text x="174" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">GpsService</text>
  <text x="174" y="371" text-anchor="middle" font-size="9" fill="#7F8C8D">UBX / NMEA / RTK</text>

  <rect x="260" y="335" width="148" height="52" rx="5" fill="url(#gradService)" stroke="#27AE60" stroke-width="1.5"/>
  <text x="334" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">InputService</text>
  <text x="334" y="371" text-anchor="middle" font-size="9" fill="#7F8C8D">GPIO / Buttons</text>

  <rect x="420" y="335" width="148" height="52" rx="5" fill="url(#gradService)" stroke="#27AE60" stroke-width="1.5"/>
  <text x="494" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">ImuService</text>
  <text x="494" y="371" text-anchor="middle" font-size="9" fill="#7F8C8D">Accel / Gyro</text>

  <rect x="580" y="335" width="148" height="52" rx="5" fill="url(#gradService)" stroke="#27AE60" stroke-width="1.5"/>
  <text x="654" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">HighLevelService</text>
  <text x="654" y="371" text-anchor="middle" font-size="9" fill="#7F8C8D">Mission State</text>

  <!-- On-board IMU row (outside firmware box, inside xCore — hardware on the board) -->
  <rect x="80" y="416" width="660" height="26" rx="4" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="410" y="433" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF">On-Board Hardware:  IMU (LSM6DS3TR-C, 6-axis, SPI)</text>

  <!-- Connection: xCore <-> Hardware -->
  <line x1="200" y1="450" x2="200" y2="490" stroke="#7F8C8D" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="200,490 195,480 205,480" fill="#7F8C8D"/>
  <rect x="180" y="466" width="40" height="14" rx="7" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
  <text x="200" y="477" text-anchor="middle" font-size="9" font-weight="600" fill="#7F8C8D">UART</text>

  <line x1="410" y1="450" x2="410" y2="490" stroke="#7F8C8D" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="410,490 405,480 415,480" fill="#7F8C8D"/>
  <rect x="355" y="466" width="110" height="14" rx="7" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
  <text x="410" y="477" text-anchor="middle" font-size="9" font-weight="600" fill="#7F8C8D">I2C / SPI / ADC</text>

  <line x1="620" y1="450" x2="620" y2="490" stroke="#7F8C8D" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="620,490 615,480 625,480" fill="#7F8C8D"/>
  <rect x="600" y="466" width="40" height="14" rx="7" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
  <text x="620" y="477" text-anchor="middle" font-size="9" font-weight="600" fill="#7F8C8D">UART</text>

  <!-- ==================== HARDWARE TIER ==================== -->
  <!-- xESC Motors -->
  <rect x="60" y="495" width="260" height="110" rx="10" fill="url(#gradHW)" filter="url(#shadow)"/>
  <text x="190" y="520" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">3x xESC mini  (VESC)</text>
  <rect x="78" y="530" width="224" height="60" rx="6" fill="url(#gradHWBox)" stroke="rgba(230,126,34,0.3)" stroke-width="1"/>
  <text x="190" y="550" text-anchor="middle" font-size="11" fill="#6D4C2F">Left Motor  ·  Right Motor  ·  Mower</text>
  <text x="190" y="570" text-anchor="middle" font-size="10" fill="#A0784C">BLDC / FOC  ·  Position Feedback</text>

  <!-- Electronics (carrier board peripherals, no IMU) -->
  <rect x="340" y="495" width="140" height="110" rx="10" fill="url(#gradHW)" filter="url(#shadow)"/>
  <text x="410" y="520" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Electronics</text>
  <rect x="352" y="530" width="116" height="60" rx="6" fill="url(#gradHWBox)" stroke="rgba(230,126,34,0.3)" stroke-width="1"/>
  <text x="410" y="552" text-anchor="middle" font-size="10" fill="#6D4C2F">Charger (BQ257x)</text>
  <text x="410" y="567" text-anchor="middle" font-size="10" fill="#6D4C2F">BMS  ·  ADC  ·  UI</text>

  <!-- GPS -->
  <rect x="500" y="495" width="260" height="110" rx="10" fill="url(#gradHW)" filter="url(#shadow)"/>
  <text x="630" y="520" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">RTK GPS Module</text>
  <rect x="518" y="530" width="224" height="60" rx="6" fill="url(#gradHWBox)" stroke="rgba(230,126,34,0.3)" stroke-width="1"/>
  <text x="630" y="550" text-anchor="middle" font-size="11" fill="#6D4C2F">UBX Binary  /  NMEA Protocol</text>
  <text x="630" y="570" text-anchor="middle" font-size="10" fill="#A0784C">RTCM Corrections  ·  cm Accuracy</text>

  <!-- Footer -->
  <text x="500" y="660" text-anchor="middle" font-size="10" fill="#BDC3C7">github.com/xtech/fw-openmower-v2</text>
</svg>